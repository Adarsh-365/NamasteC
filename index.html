<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Namaste China - India's Gateway to China Business</title>
    <meta name="description" content="Namaste China is India's premier B2B trade gateway. Join Canton Fair 2026 delegations, verify Chinese suppliers, schedule factory visits, and simplify customs compliance." />
    <link rel="canonical" href="https://www.namastechina.org/" />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- B2B Structured Data Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Namaste China",
      "description": "India's Gateway to China Business - Sourcing, Canton Fair delegations, and trade consulting.",
      "url": "https://www.namastechina.org/",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mumbai",
        "addressCountry": "IN"
      },
      "areaServed": ["IN", "CN"],
      "service": [
        {
          "@type": "Service",
          "name": "Canton Fair Delegation",
          "description": "Guided trade fair tour and visa services for Indian importers."
        },
        {
          "@type": "Service",
          "name": "China Sourcing & Sourcing",
          "description": "Verify suppliers and inspect product samples at our Mumbai warehouse."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
